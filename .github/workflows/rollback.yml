name: Rollback

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Short Git SHA of the image to roll back to (7 chars)'
        required: true
        type: string

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  rollback:
    name: Rollback to SHA
    runs-on: ubuntu-latest

    steps:
      - name: Validate SHA input
        run: |
          if [ -z "${{ github.event.inputs.sha }}" ]; then
            echo "Error: SHA is required"
            exit 1
          fi
          echo "Rolling back to SHA: ${{ github.event.inputs.sha }}"

      - name: Rollback on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            SHA=${{ github.event.inputs.sha }}

            # Verify images with this SHA exist
            if ! docker image inspect restaurantos-admin:${SHA} > /dev/null 2>&1; then
              echo "Error: restaurantos-admin:${SHA} not found"
              exit 1
            fi
            if ! docker image inspect restaurantos-portal:${SHA} > /dev/null 2>&1; then
              echo "Error: restaurantos-portal:${SHA} not found"
              exit 1
            fi

            # Stop and remove current containers
            docker stop restaurantos-admin || true
            docker rm restaurantos-admin || true
            docker stop restaurantos-portal || true
            docker rm restaurantos-portal || true

            # Start containers with the specified SHA tag
            docker run -d \
              --name restaurantos-admin \
              --restart unless-stopped \
              -p 3005:3005 \
              --env-file /opt/restaurantos/.env \
              restaurantos-admin:${SHA}

            docker run -d \
              --name restaurantos-portal \
              --restart unless-stopped \
              -p 3006:3006 \
              --env-file /opt/restaurantos/.env \
              restaurantos-portal:${SHA}

            echo "Rollback to ${SHA} complete at $(date)"

      - name: Verify rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 10
            curl -f http://localhost:3005/api/health || echo "Admin health check failed"
            curl -f http://localhost:3006/api/health || echo "Portal health check failed"
