name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Admin image
        run: |
          docker build \
            -f apps/admin/Dockerfile \
            --build-arg NEXT_PUBLIC_CONVEX_URL=https://convex.restaurants.irawatkins.com \
            -t restaurantos-admin:latest .

      - name: Build Portal image
        run: |
          docker build \
            -f apps/portal/Dockerfile \
            --build-arg NEXT_PUBLIC_CONVEX_URL=https://convex.restaurants.irawatkins.com \
            -t restaurantos-portal:latest .

      - name: Save Docker images
        run: |
          docker save restaurantos-admin:latest | gzip > admin.tar.gz
          docker save restaurantos-portal:latest | gzip > portal.tar.gz

      - name: Copy images to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "admin.tar.gz,portal.tar.gz"
          target: /tmp/restaurantos-deploy

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /tmp/restaurantos-deploy
            docker load < admin.tar.gz
            docker load < portal.tar.gz

            # Restart containers (Coolify-managed — adjust if using docker-compose)
            docker stop restaurantos-admin-app || true
            docker rm restaurantos-admin-app || true
            docker stop restaurantos-portal-app || true
            docker rm restaurantos-portal-app || true

            echo "Images loaded. Restart containers via Coolify dashboard or docker run commands."
            echo "Deploy complete at $(date)"

            # Cleanup
            rm -f admin.tar.gz portal.tar.gz
